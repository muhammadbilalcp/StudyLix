<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StudyLyx – Learn. Challenge. Grow.</title>
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --indigo:    #1a1560;
    --indigo-md: #2d27a8;
    --violet:    #7c3aed;
    --violet-lt: #ede9fe;
    --gold:      #f59e0b;
    --gold-lt:   #fef3c7;
    --slate-50:  #f8fafc;
    --slate-100: #f1f5f9;
    --slate-200: #e2e8f0;
    --slate-400: #94a3b8;
    --slate-600: #475569;
    --slate-800: #1e293b;
    --green:     #10b981;
    --red:       #ef4444;
    --white:     #ffffff;
    --nav-w:     260px;
    --radius:    14px;
    --shadow:    0 4px 24px rgba(26,21,96,.10);
    --shadow-lg: 0 12px 40px rgba(26,21,96,.18);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--slate-100);
    color: var(--slate-800);
    min-height: 100vh;
    overflow-x: hidden;
  }

/* ── Typography ───────────────────────────────────── */
h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; line-height: 1.15; }
h2 { font-size: clamp(1.3rem, 2.5vw, 1.8rem); font-weight: 700; }
h3 { font-size: 1.1rem; font-weight: 700; }
p  { line-height: 1.65; color: var(--slate-600); }

/* ── Utilities ────────────────────────────────────── */
.hidden   { display: none !important; }
.flex     { display: flex; }
.items-c  { align-items: center; }
.gap-1    { gap: .5rem; }
.gap-2    { gap: 1rem; }
.text-c   { text-align: center; }
.w-full   { width: 100%; }
.mt-1     { margin-top: .5rem; }
.mt-2     { margin-top: 1rem; }
.mt-3     { margin-top: 1.5rem; }

/* ── Buttons ──────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
  padding: .65rem 1.4rem; border-radius: 10px; font-size: .9rem; font-weight: 600;
  cursor: pointer; border: none; transition: all .2s; white-space: nowrap;
}
.btn-primary   { background: var(--violet); color: #fff; }
.btn-primary:hover { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,58,237,.35); }
.btn-secondary { background: var(--white); color: var(--violet); border: 2px solid var(--violet); }
.btn-secondary:hover { background: var(--violet-lt); }
.btn-gold      { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #d97706; transform: translateY(-1px); }
.btn-danger    { background: var(--red); color: #fff; }
.btn-danger:hover { background: #dc2626; }
.btn-sm        { padding: .45rem 1rem; font-size: .82rem; }

/* ── Form Inputs ──────────────────────────────────── */
.input-group { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
.input-group label { font-size: .85rem; font-weight: 600; color: var(--slate-600); }
.input-group input, .input-group select, .input-group textarea {
  padding: .7rem 1rem; border: 1.5px solid var(--slate-200); border-radius: 10px;
  font-size: .95rem; font-family: inherit; background: var(--white);
  transition: border-color .2s, box-shadow .2s;
}
.input-group input:focus, .input-group select:focus {
  outline: none; border-color: var(--violet);
  box-shadow: 0 0 0 3px rgba(124,58,237,.15);
}
.search-wrap { position: relative; }
.search-wrap input { padding-left: 2.8rem; }
.search-wrap .search-icon {
  position: absolute; left: .9rem; top: 50%; transform: translateY(-50%);
  color: var(--slate-400); font-size: 1rem; pointer-events: none;
}

/* ── Cards ────────────────────────────────────────── */
.card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 1.5rem; transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }

/* ── Badge ────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; padding: .2rem .7rem;
  border-radius: 99px; font-size: .75rem; font-weight: 700; gap: .3rem;
}
.badge-violet { background: var(--violet-lt); color: var(--violet); }
.badge-gold   { background: var(--gold-lt);   color: #92400e; }
.badge-green  { background: #d1fae5; color: #065f46; }
.badge-red    { background: #fee2e2;           color: #991b1b; }

/* ── Auth Screens ─────────────────────────────────── */
#auth-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 100%);
  padding: 1.5rem; position: relative; overflow: hidden;
}
.auth-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.auth-particles span {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,.08);
  animation: float 8s infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); opacity: .5; }
  50%       { transform: translateY(-40px) scale(1.1); opacity: 1; }
}
.auth-box {
  background: var(--white); border-radius: 20px; box-shadow: var(--shadow-lg);
  padding: 2.5rem; width: 100%; max-width: 420px; position: relative; z-index: 1;
}
.auth-logo { display: flex; align-items: center; gap: .6rem; margin-bottom: 1.8rem; }
.auth-logo .spark { font-size: 2rem; }
.auth-logo .name  { font-size: 1.6rem; font-weight: 800; color: var(--indigo); }
.auth-logo .name span { color: var(--violet); }
.auth-tabs { display: flex; gap: .5rem; margin-bottom: 1.8rem; background: var(--slate-100); padding: .4rem; border-radius: 10px; }
.auth-tab  {
  flex: 1; padding: .6rem; border: none; background: transparent; border-radius: 8px;
  font-size: .9rem; font-weight: 600; cursor: pointer; color: var(--slate-400); transition: all .2s;
}
.auth-tab.active { background: var(--white); color: var(--indigo); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.auth-error { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: .7rem 1rem; font-size: .85rem; margin-bottom: 1rem; }

/* ── App Layout ───────────────────────────────────── */
#app { display: flex; min-height: 100vh; }

/* ── Sidebar ──────────────────────────────────────── */
#sidebar {
  width: var(--nav-w); background: var(--indigo); color: var(--white);
  position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  display: flex; flex-direction: column; transition: transform .3s; overflow-y: auto;
}
.sidebar-logo {
  padding: 1.5rem 1.2rem 1.2rem; display: flex; align-items: center; gap: .7rem;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo .spark-icon { font-size: 1.6rem; }
.sidebar-logo .logo-text  { font-size: 1.3rem; font-weight: 800; }
.sidebar-logo .logo-text span { color: var(--gold); }
.sidebar-user {
  padding: 1rem 1.2rem; border-bottom: 1px solid rgba(255,255,255,.1);
  display: flex; align-items: center; gap: .8rem;
}
.avatar {
  width: 38px; height: 38px; border-radius: 50%; background: var(--violet);
  display: flex; align-items: center; justify-content: center;
  font-size: .95rem; font-weight: 700; flex-shrink: 0;
}
.user-info .user-name  { font-size: .9rem; font-weight: 700; }
.user-info .user-email { font-size: .75rem; color: rgba(255,255,255,.55); word-break: break-all; }
nav.sidebar-nav { flex: 1; padding: .8rem 0; }
.nav-section-label {
  font-size: .68rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,.35); padding: .8rem 1.2rem .3rem;
}
.nav-link {
  display: flex; align-items: center; gap: .8rem; padding: .7rem 1.2rem; color: rgba(255,255,255,.75);
  cursor: pointer; transition: all .15s; border-radius: 0; font-size: .9rem; font-weight: 500;
}
.nav-link .nav-icon { font-size: 1.1rem; width: 1.3rem; text-align: center; }
.nav-link:hover   { background: rgba(255,255,255,.08); color: var(--white); }
.nav-link.active  { background: rgba(124,58,237,.35); color: var(--white); border-right: 3px solid var(--gold); }
.sidebar-footer { padding: 1rem 1.2rem; border-top: 1px solid rgba(255,255,255,.1); }

/* ── Main Content ─────────────────────────────────── */
#main-content { margin-left: var(--nav-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
.top-bar {
  background: var(--white); border-bottom: 1px solid var(--slate-200);
  padding: .9rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50; gap: 1rem;
}
.top-bar-title { font-size: 1.1rem; font-weight: 700; color: var(--indigo); }
.page-content { flex: 1; padding: 1.8rem; }

/* ── Mobile Hamburger ─────────────────────────────── */
.hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: .3rem; border: none; background: transparent;
}
.hamburger span { display: block; width: 22px; height: 2px; background: var(--slate-800); border-radius: 2px; transition: all .3s; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 90; }

/* ── Hero Section ─────────────────────────────────── */
.hero {
  background: linear-gradient(135deg, var(--indigo) 0%, var(--indigo-md) 50%, var(--violet) 100%);
  border-radius: var(--radius); padding: 3rem 2.5rem; color: var(--white); position: relative; overflow: hidden; margin-bottom: 2rem;
}
.hero::before {
  content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,255,255,.05);
}
.hero::after {
  content: ''; position: absolute; bottom: -80px; right: 80px; width: 200px; height: 200px; border-radius: 50%; background: rgba(245,158,11,.1);
}
.hero h1 { color: var(--white); margin-bottom: .8rem; }
.hero p   { color: rgba(255,255,255,.8); font-size: 1.1rem; margin-bottom: 1.8rem; }
.hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
.hero-stats { display: flex; gap: 2rem; margin-top: 2rem; flex-wrap: wrap; }
.hero-stat .num  { font-size: 1.6rem; font-weight: 800; color: var(--gold); }
.hero-stat .lbl  { font-size: .8rem; color: rgba(255,255,255,.65); }
.hero-search { margin-top: 1.5rem; position: relative; max-width: 480px; }
.hero-search input {
  width: 100%; padding: .9rem 1rem .9rem 3rem; border: none; border-radius: 12px; font-size: 1rem; background: rgba(255,255,255,.15);
  color: var(--white); backdrop-filter: blur(10px);
}
.hero-search input::placeholder { color: rgba(255,255,255,.6); }
.hero-search input:focus { outline: 2px solid var(--gold); background: rgba(255,255,255,.2); }
.hero-search .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.7); }

/* ── Subject Cards ────────────────────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }

.subject-card { border-radius: var(--radius); padding: 1.5rem; color: var(--white); cursor: pointer; transition: all .25s; position: relative; overflow: hidden; }
.subject-card::after { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,.1); transition: transform .3s; }
.subject-card:hover::after { transform: scale(2); }
.subject-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); }
.subject-card .icon { font-size: 2rem; margin-bottom: .8rem; }
.subject-card h3    { color: var(--white); font-size: 1.1rem; }
.subject-card .meta { font-size: .8rem; color: rgba(255,255,255,.75); margin-top: .3rem; }
.subject-card.math    { background: linear-gradient(135deg, #4f46e5, #7c3aed); }
.subject-card.science { background: linear-gradient(135deg, #059669, #10b981); }
.subject-card.english { background: linear-gradient(135deg, #dc2626, #f97316); }
.subject-card.social  { background: linear-gradient(135deg, #d97706, #f59e0b); }

/* ── Notes ────────────────────────────────────────── */
.notes-sidebar { width: 240px; flex-shrink: 0; }
.notes-layout { display: flex; gap: 1.5rem; }
.notes-main   { flex: 1; min-width: 0; }
.note-subject-btn {
  display: flex; align-items: center; gap: .7rem; padding: .7rem 1rem; border-radius: 10px;
  cursor: pointer; transition: all .15s; font-size: .9rem; font-weight: 500; color: var(--slate-600);
  border: none; background: transparent; width: 100%; text-align: left;
}
.note-subject-btn:hover   { background: var(--violet-lt); color: var(--violet); }
.note-subject-btn.active  { background: var(--violet); color: var(--white); }
.note-subject-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
.chapter-list { margin-top: .5rem; }
.chapter-item { padding: .55rem .9rem .55rem 2rem; border-radius: 8px; font-size: .85rem; cursor: pointer; transition: background .15s; color: var(--slate-600); }
.chapter-item:hover  { background: var(--slate-100); }
.chapter-item.active { background: var(--violet-lt); color: var(--violet); font-weight: 600; }
.note-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.8rem; }
.note-card h2 { margin-bottom: .3rem; }
.note-card .note-meta { display: flex; gap: .8rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
.note-body h3 { margin: 1.2rem 0 .5rem; color: var(--indigo); }
.note-body p  { margin-bottom: .8rem; }
.note-body ul { padding-left: 1.4rem; margin-bottom: .8rem; }
.note-body ul li { margin-bottom: .35rem; color: var(--slate-600); line-height: 1.6; }
.note-body .key-formula {
  background: var(--violet-lt); border-left: 4px solid var(--violet); padding: .9rem 1.2rem; border-radius: 0 8px 8px 0; margin: 1rem 0;
  font-family: 'Courier New', monospace; color: var(--indigo); font-weight: 600;
}

/* ── Quiz ─────────────────────────────────────────── */
.quiz-subjects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
.quiz-subject-card {
  border-radius: var(--radius); padding: 1.5rem; cursor: pointer; text-align: center;
  background: var(--white); box-shadow: var(--shadow); transition: all .2s; border: 2px solid transparent;
}
.quiz-subject-card:hover { border-color: var(--violet); transform: translateY(-2px); }
.quiz-subject-card .icon { font-size: 2.5rem; margin-bottom: .5rem; }
.quiz-subject-card h3 { color: var(--indigo); }
.quiz-subject-card p  { font-size: .85rem; margin-top: .3rem; }

.quiz-wrap { max-width: 640px; margin: 0 auto; }
.quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.quiz-progress-bar { height: 6px; background: var(--slate-200); border-radius: 99px; overflow: hidden; flex: 1; margin: 0 1rem; }
.quiz-progress-fill { height: 100%; background: var(--violet); border-radius: 99px; transition: width .3s; }
.question-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2rem; }
.question-num { font-size: .8rem; font-weight: 700; color: var(--violet); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
.question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 1.5rem; color: var(--indigo); }
.options-list { display: flex; flex-direction: column; gap: .7rem; }
.option-btn {
  display: flex; align-items: center; gap: 1rem; padding: .9rem 1.2rem;
  border-radius: 10px; border: 2px solid var(--slate-200); background: var(--white);
  cursor: pointer; text-align: left; transition: all .2s; font-size: .95rem; font-weight: 500;
}
.option-btn:hover:not(:disabled) { border-color: var(--violet); background: var(--violet-lt); }
.option-btn .opt-label {
  width: 28px; height: 28px; border-radius: 50%; background: var(--slate-100);
  display: flex; align-items: center; justify-content: center; font-size: .8rem; font-weight: 700; flex-shrink: 0;
}
.option-btn.correct   { border-color: var(--green); background: #d1fae5; }
.option-btn.wrong     { border-color: var(--red);   background: #fee2e2; }
.option-btn.correct .opt-label { background: var(--green); color: var(--white); }
.option-btn.wrong   .opt-label { background: var(--red);   color: var(--white); }
.feedback-box { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 10px; font-size: .9rem; font-weight: 500; animation: fadeIn .3s; }
.feedback-box.correct { background: #d1fae5; color: #065f46; border-left: 4px solid var(--green); }
.feedback-box.wrong   { background: #fee2e2; color: #991b1b; border-left: 4px solid var(--red); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* Results */
.results-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 2.5rem; text-align: center; max-width: 480px; margin: 0 auto; }
.score-ring { width: 140px; height: 140px; margin: 1.5rem auto; position: relative; display: flex; align-items: center; justify-content: center; }
.score-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.score-ring .score-num { font-size: 2.2rem; font-weight: 800; color: var(--indigo); line-height: 1; }
.score-ring .score-lbl { font-size: .75rem; color: var(--slate-400); }
.result-breakdown { display: flex; gap: 1rem; justify-content: center; margin: 1rem 0 1.5rem; }
.result-stat { text-align: center; }
.result-stat .val { font-size: 1.4rem; font-weight: 800; }
.result-stat .lbl { font-size: .75rem; color: var(--slate-400); }

/* ── Dashboard ────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.4rem; display: flex; flex-direction: column; gap: .5rem; }
.stat-card .stat-icon { font-size: 1.8rem; }
.stat-card .stat-val  { font-size: 1.8rem; font-weight: 800; color: var(--indigo); }
.stat-card .stat-lbl  { font-size: .82rem; color: var(--slate-400); font-weight: 600; }
.stat-card .stat-trend { font-size: .78rem; color: var(--green); font-weight: 600; }

.profile-card {
  background: linear-gradient(135deg, var(--indigo), var(--violet));
  border-radius: var(--radius); padding: 2rem; color: var(--white); display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;
}
.profile-avatar {
  width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; border: 3px solid var(--gold); flex-shrink: 0;
}
.profile-info h2  { color: var(--white); }
.profile-info p   { color: rgba(255,255,255,.7); font-size: .9rem; margin-top: .2rem; }
.profile-info .badges { display: flex; gap: .5rem; margin-top: .7rem; flex-wrap: wrap; }

.scores-table { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.scores-table table { width: 100%; border-collapse: collapse; }
.scores-table th { background: var(--slate-50); padding: .9rem 1.2rem; text-align: left; font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--slate-400); }
.scores-table td { padding: .9rem 1.2rem; border-top: 1px solid var(--slate-100); font-size: .9rem; }
.score-bar { height: 6px; border-radius: 99px; background: var(--slate-200); }
.score-bar-fill { height: 100%; border-radius: 99px; background: var(--violet); }

/* ── Daily Challenge ──────────────────────────────── */
.challenge-card {
  background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: var(--radius);
  padding: 2rem; color: var(--white); margin-bottom: 1.5rem; position: relative; overflow: hidden;
}
.challenge-card::before { content: '⚡'; position: absolute; right: 1.5rem; top: 1rem; font-size: 5rem; opacity: .2; }
.challenge-card h2 { color: var(--white); }
.challenge-card p  { color: rgba(255,255,255,.85); margin-top: .3rem; }
.challenge-form { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.8rem; max-width: 640px; }
.challenge-options { display: flex; flex-direction: column; gap: .7rem; margin: 1.2rem 0; }
.challenge-opt {
  display: flex; align-items: center; gap: .8rem; padding: .8rem 1.2rem;
  border-radius: 10px; border: 2px solid var(--slate-200); cursor: pointer; transition: all .2s; background: var(--white);
}
.challenge-opt:hover { border-color: var(--gold); background: var(--gold-lt); }
.challenge-opt input[type=radio] { accent-color: var(--gold); width: 16px; height: 16px; flex-shrink: 0; }
.challenge-result { padding: 1.2rem; border-radius: 10px; margin-top: 1rem; font-weight: 600; animation: fadeIn .3s; }
.challenge-result.correct { background: #d1fae5; color: #065f46; }
.challenge-result.wrong   { background: #fee2e2; color: #991b1b; }

/* ── Streak & Progress ────────────────────────────── */
.progress-bar-wrap { background: var(--slate-200); border-radius: 99px; height: 10px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--violet), var(--gold)); transition: width .6s ease; }

/* ── Search Results ───────────────────────────────── */
.search-results { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.search-result-item {
  display: flex; align-items: flex-start; gap: 1rem; padding: 1rem 1.2rem;
  border-bottom: 1px solid var(--slate-100); cursor: pointer; transition: background .15s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--slate-50); }
.search-result-item .result-icon { font-size: 1.4rem; }
.search-result-item .result-info h4 { font-size: .95rem; color: var(--indigo); }
.search-result-item .result-info p  { font-size: .82rem; margin-top: .2rem; }

/* ── Toast ────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
  background: var(--slate-800); color: var(--white); padding: .8rem 1.4rem;
  border-radius: 12px; font-size: .9rem; font-weight: 500; box-shadow: var(--shadow-lg);
  transform: translateY(100px); opacity: 0; transition: all .3s;
  display: flex; align-items: center; gap: .6rem;
}
#toast.show { transform: none; opacity: 1; }
#toast.success { border-left: 4px solid var(--green); }
#toast.error   { border-left: 4px solid var(--red); }

/* ── Responsive ───────────────────────────────────── */
@media (max-width: 1024px) {
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .grid-4 { grid-template-columns: repeat(2,1fr); }
}
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: none; }
  .sidebar-overlay { display: block; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .sidebar-overlay.show { opacity: 1; pointer-events: all; }
  #main-content { margin-left: 0; }
  .hamburger { display: flex; }
  .page-content { padding: 1rem; }
  .hero { padding: 1.8rem 1.2rem; }
  .notes-layout { flex-direction: column; }
  .notes-sidebar { width: 100%; }
  .quiz-subjects-grid { grid-template-columns: repeat(2,1fr); }
  .profile-card { flex-direction: column; text-align: center; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .grid-3 { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .grid-4, .grid-2 { grid-template-columns: 1fr; }
  .quiz-subjects-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr; }
  .hero-stats { gap: 1rem; }
}
</style>
</head>
<body>

  <div id="auth-screen">
    <div class="auth-particles" id="auth-particles"></div>
    <div class="auth-box">
      <div class="auth-logo">
        <span class="spark">⚡</span>
        <span class="name">Study<span>Lyx</span></span>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showAuthTab('login')">Log In</button>
        <button class="auth-tab" onclick="showAuthTab('signup')">Sign Up</button>
      </div>
      
      <div id="auth-error" class="auth-error hidden"></div>

      <div id="login-form">
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary w-full" id="login-submit-btn" onclick="handleLogin()" style="margin-top:.5rem">Log In →</button>
      </div>

      <div id="signup-form" class="hidden">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="Alex Johnson" />
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" />
        </div>
        <button class="btn btn-primary w-full" id="signup-submit-btn" onclick="handleSignup()" style="margin-top:.5rem">Create Account →</button>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <aside id="sidebar">
      <div class="sidebar-logo">
        <span class="spark-icon">⚡</span>
        <span class="logo-text">Study<span>Lyx</span></span>
      </div>
      <div class="sidebar-user">
        <div class="avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">Alex</div>
          <div class="user-email" id="sidebar-email">alex@example.com</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Learn</div>
        <div class="nav-link active" onclick="navigate('home')" id="nav-home">
          <span class="nav-icon">🏠</span> Home
        </div>
        <div class="nav-link" onclick="navigate('notes')" id="nav-notes">
          <span class="nav-icon">📚</span> Notes
        </div>
        <div class="nav-link" onclick="navigate('quiz')" id="nav-quiz">
          <span class="nav-icon">🧠</span> Quizzes
        </div>
        <div class="nav-link" onclick="navigate('challenge')" id="nav-challenge">
          <span class="nav-icon">⚡</span> Daily Challenge
        </div>
        <div class="nav-section-label">Account</div>
        <div class="nav-link" onclick="navigate('dashboard')" id="nav-dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-danger btn-sm w-full" onclick="handleLogout()">🚪 Log Out</button>
      </div>
    </aside>
    
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
    
    </div>

</body>
</html>
